services:
  - type: web
    name: intelli-migrate-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

  - type: web
    name: intelli-migrate-worker
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -r requirements-ml.txt
    startCommand: gunicorn worker.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
